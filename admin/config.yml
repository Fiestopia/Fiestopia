backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

locale: 'es'

collections:

  # ── HOME ──────────────────────────────────────────
  - name: "home"
    label: "Home"
    files:
      - name: "home"
        label: "Página principal"
        file: "content/home.json"
        fields:
          - label: "Hero · Título línea 1"
            name: "hero_l1"
            widget: "string"
            default: "Formatos"
          - label: "Hero · Título línea 2 (dorado)"
            name: "hero_l2"
            widget: "string"
            default: "que llenan"
          - label: "Hero · Título línea 3"
            name: "hero_l3"
            widget: "string"
            default: "salas."
          - label: "Hero · Subtítulo"
            name: "hero_sub"
            widget: "text"
            default: "25 años creando experiencias de ocio en la Comunitat Valenciana."
          - label: "Estadística 1 · Número"
            name: "stat1_num"
            widget: "string"
            default: "25+"
          - label: "Estadística 1 · Texto"
            name: "stat1_label"
            widget: "string"
            default: "Años de experiencia"
          - label: "Estadística 2 · Número"
            name: "stat2_num"
            widget: "string"
            default: "4"
          - label: "Estadística 2 · Texto"
            name: "stat2_label"
            widget: "string"
            default: "Marcas activas"
          - label: "Próximo evento · Fecha"
            name: "next_event_date"
            widget: "string"
            default: "12 Abr · Gandia"

  # ── EVENTOS ───────────────────────────────────────
  - name: "eventos"
    label: "Eventos"
    label_singular: "Evento"
    folder: "content/eventos"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Nombre del evento"
        name: "title"
        widget: "string"
      - label: "Marca"
        name: "marca"
        widget: "select"
        options: ["sansaru", "ochentera", "bocachica", "weddings"]
      - label: "Fecha"
        name: "fecha"
        widget: "string"
        hint: "Ej: Sáb 12 Abr 2026 · 17:00h"
      - label: "Sala / Lugar"
        name: "lugar"
        widget: "string"
      - label: "Ciudad"
        name: "ciudad"
        widget: "string"
      - label: "Precio entrada"
        name: "precio"
        widget: "number"
      - label: "URL Fourvenues"
        name: "url_fourvenues"
        widget: "string"
        default: "https://pro.fourvenues.com/"
      - label: "Pocas entradas"
        name: "pocas_entradas"
        widget: "boolean"
        default: false
      - label: "Imagen del evento"
        name: "imagen"
        widget: "image"
        required: false

  # ── MARCAS ────────────────────────────────────────
  - name: "marcas"
    label: "Marcas"
    files:

      - name: "sansaru"
        label: "Sansaru On Tour"
        file: "content/marcas/sansaru.json"
        fields:
          - label: "Título héroe línea 1"
            name: "hero_l1"
            widget: "string"
            default: "Sansaru"
          - label: "Título héroe línea 2"
            name: "hero_l2"
            widget: "string"
            default: "On Tour."
          - label: "Subtítulo"
            name: "hero_sub"
            widget: "text"
          - label: "Descripción (¿Qué es?)"
            name: "descripcion"
            widget: "text"
          - label: "Imagen de fondo hero"
            name: "hero_imagen"
            widget: "image"
            required: false

      - name: "ochentera"
        label: "Ochentera"
        file: "content/marcas/ochentera.json"
        fields:
          - label: "Título héroe"
            name: "hero_titulo"
            widget: "string"
            default: "Viaja a los ochenta."
          - label: "Subtítulo"
            name: "hero_sub"
            widget: "text"
          - label: "Descripción"
            name: "descripcion"
            widget: "text"
          - label: "Imagen de fondo hero"
            name: "hero_imagen"
            widget: "image"
            required: false

      - name: "bocachica"
        label: "Bocachica"
        file: "content/marcas/bocachica.json"
        fields:
          - label: "Título héroe"
            name: "hero_titulo"
            widget: "string"
            default: "No se busca. Se recuerda."
          - label: "Subtítulo"
            name: "hero_sub"
            widget: "text"
          - label: "Descripción"
            name: "descripcion"
            widget: "text"
          - label: "Imagen de fondo hero"
            name: "hero_imagen"
            widget: "image"
            required: false

      - name: "weddings"
        label: "Sansaru Weddings"
        file: "content/marcas/weddings.json"
        fields:
          - label: "Título héroe"
            name: "hero_titulo"
            widget: "string"
            default: "El día que nadie olvidará."
          - label: "Subtítulo"
            name: "hero_sub"
            widget: "text"
          - label: "Precio Sansaru Lite"
            name: "precio_lite"
            widget: "number"
            default: 600
          - label: "Precio Sansaru Weddings"
            name: "precio_full"
            widget: "number"
            default: 1500
          - label: "Precio hora extra"
            name: "precio_hora_extra"
            widget: "number"
            default: 100

  # ── CONTACTO ──────────────────────────────────────
  - name: "contacto"
    label: "Contacto"
    files:
      - name: "contacto"
        label: "Página de contacto"
        file: "content/contacto.json"
        fields:
          - label: "Teléfono"
            name: "telefono"
            widget: "string"
            default: "645 714 101"
          - label: "Ubicación"
            name: "ubicacion"
            widget: "string"
            default: "Villalonga, Valencia"
          - label: "Horario Lunes-Viernes"
            name: "horario_lv"
            widget: "string"
            default: "10:00 – 20:00"
          - label: "Horario Sábado"
            name: "horario_sab"
            widget: "string"
            default: "10:00 – 14:00"
          - label: "Email info Fiestopia"
            name: "email_fiestopia"
            widget: "string"
            default: "info@fiestopia.es"
          - label: "Email info Sansaru"
            name: "email_sansaru"
            widget: "string"
            default: "info@sansaru.es"

  # ── NOSOTROS ──────────────────────────────────────
  - name: "nosotros"
    label: "Sobre nosotros"
    files:
      - name: "nosotros"
        label: "Página sobre nosotros"
        file: "content/nosotros.json"
        fields:
          - label: "Título principal"
            name: "titulo"
            widget: "string"
            default: "No organizamos fiestas. Creamos recuerdos."
          - label: "Párrafo 1"
            name: "parrafo1"
            widget: "text"
          - label: "Párrafo 2"
            name: "parrafo2"
            widget: "text"
          - label: "Foto principal"
            name: "foto_principal"
            widget: "image"
            required: false
          - label: "Año fundación Sansaru"
            name: "año_sansaru"
            widget: "string"
            default: "2010"
          - label: "Texto timeline Sansaru"
            name: "timeline_sansaru"
            widget: "text"
