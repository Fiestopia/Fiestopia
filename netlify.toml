[build]
  publish = "."
  functions = "netlify/functions"

# ── REDIRECTS POR DOMINIO ─────────────────────────────────────────────────────

[[redirects]]
  from = "/*"
  to = "/pages/sansaru.html"
  status = 200
  conditions = {Host = ["sansaru.es", "www.sansaru.es"]}

[[redirects]]
  from = "/*"
  to = "/pages/weddings.html"
  status = 200
  conditions = {Host = ["sansaruweddings.es", "www.sansaruweddings.es"]}

[[redirects]]
  from = "/*"
  to = "/pages/ochentera.html"
  status = 200
  conditions = {Host = ["ochentera.es", "www.ochentera.es"]}

[[redirects]]
  from = "/*"
  to = "/pages/bocachica.html"
  status = 200
  conditions = {Host = ["bocachica.es", "www.bocachica.es"]}

# ── URLS LIMPIAS fiestopia.es ─────────────────────────────────────────────────
[[redirects]]
  from = "/contacto"
  to = "/pages/contacto.html"
  status = 200

[[redirects]]
  from = "/eventos"
  to = "/pages/eventos.html"
  status = 200

[[redirects]]
  from = "/nosotros"
  to = "/pages/nosotros.html"
  status = 200

[[redirects]]
  from = "/ochentera"
  to = "/pages/ochentera.html"
  status = 200

[[redirects]]
  from = "/bocachica"
  to = "/pages/bocachica.html"
  status = 200

[[redirects]]
  from = "/sansaru"
  to = "/pages/sansaru.html"
  status = 200

[[redirects]]
  from = "/para-salas"
  to = "/pages/para-salas.html"
  status = 200

[[redirects]]
  from = "/weddings"
  to = "/pages/weddings.html"
  status = 200

[[redirects]]
  from = "/rainbow"
  to = "/pages/rainbow.html"
  status = 200

# ── HEADERS ───────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-cache"
